[pytest]
# Pytest configuration for open_dvm

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test categorization
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, test multiple components)
    slow: Slow running tests (use -m "not slow" to skip)

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Minimum Python version
minversion = 6.0
